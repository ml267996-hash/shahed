<title>لشهد عمري وحياتيGULUM 💖</title>

<style>
body {
text-align: center;
background: #ffe6f0;
font-family: Arial;
}

.box {
margin-top: 50px;
}

img {
width: 200px;
}

button {
margin: 10px;
padding: 10px 20px;
border: none;
border-radius: 10px;
background: pink;
font-size: 18px;
cursor: pointer;
}

button:hover {
background: hotpink;
}
</style>
</head>

<body>

<div class="box">
<img src="sara.png">

<h2 id="text">
هاي شهودتي كيفك يا عيوني ياريت تكوني بخير هاد الموقع ساويته لاحكي شي بقلبي وعندك الخيارات💗
</h2>

<button id="btnNext">مهتمه خليكي عم تضغطي هون 💌</button>
<button id="btnLove">مو مهتمه فيك تضغطي هون 💖</button>
<button id="btnFun">هاد لزر مفاجا لو خترتي تكملي بليز خليها للاخير ولتزمي بلقوانين 🥺</button>

</div>

<script>
let step = 0;

document.getElementById("btnNext").onclick = function () {
step++;

if (step == 1) {
document.getElementById("text").innerText = "في شي بدي احكيلك ياه 🥺";
}
else if (step == 2) {
document.getElementById("text").innerText = "فكرت كتير شو ممكن اعمل لاحكي الي بقلبي وخطر عبالي هلموقع 💭";
}
else if (step == 3) {
document.getElementById("text").innerText = "اول شي الي بقلبي والي انو انا حاب اتعرف عليك ونعطي فرصه لبعض.😳";
}
else if (step == 4) {
document.getElementById("text").innerText = "كنتي كراش طفولتي 💖";
}
else if (step == 5) {
document.getElementById("text").innerText = "هاد كلي الي بقلبي💖";
}
else if (step == 6) {
document.getElementById("text").innerText = "لو قريتي صار فيك تضغطي عزر المفاجا🥺";
}
};

document.getElementById("btnLove").onclick = function () {
document.getElementById("text").innerText =
"لو كبستي هلزر رح اعرف اني مو مهم او مرغوب بلنسبه الك ولو كبستيه من باب لفضول خبريني 💕";
};

document.getElementById("btnFun").onclick = function () {
document.getElementById("text").innerText =
`يا من سكنتِ القلب دون استئذان
وأشرقتِ كالفجر في عتم الزمان

مررتِ كنسمةٍ فاهتزّ كياني
وغدوتِ في عيني أجمل الأوطان

لا أدري كيف أبدأ الكلام
وقلبي يسبقني بكل الألحان

هل تسمحين بلحظةٍ وحديث؟
ننسج فيه الودّ كالأغصان

أودّ أن أعرفكِ… لا أكثر
فربما نكتب أجمل عنوان

وإن ابتسمتِ، فذاك يكفيني
أنّي بدأتُ معكِ أول الأمان 💫 ❤️`;
};
</script>

</body>
</html>

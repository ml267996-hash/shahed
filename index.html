<title>لساره عمري وحايتي GULUM 💖</title>

<style>
body {
text-align: center;
background: #ffe6f0;
font-family: Arial;
}

.box {
margin-top: 50px;
}

img {
width: 200px;
}

button {
margin: 10px;
padding: 10px 20px;
border: none;
border-radius: 10px;
background: pink;
font-size: 18px;
cursor: pointer;
}

button:hover {
background: hotpink;
}
</style>
</head>

<body>

<div class="box">
<img src="sara.png">

<h2 id="text">
مرحباً كيفك سوسو في شي بخاطري بقولو وعندك خيارات تختاري زي مابدك يا عيوني 💗
</h2>

<button id="btnNext">مهتمه خليكي عم تضغطي هون 💌</button>
<button id="btnLove">مو مهتمه فيك تضغطي هون 💖</button>
<button id="btnFun">هاد لزر مفاجا لو خترتي تكملي بليز خليها للاخير ولتزمي بلقوانين 🥺</button>

</div>

<script>
let step = 0;

document.getElementById("btnNext").onclick = function () {
step++;

if (step == 1) {
document.getElementById("text").innerText = "في شي أبي أقوله لك 🥺";
}
else if (step == 2) {
document.getElementById("text").innerText = "فكرت كتير شو ممكن اسوي واعمل لاراضيك وخطر في بالي هلموقع ياريت يعجبك💭";
}
else if (step == 3) {
document.getElementById("text").innerText = "اول شي الي بقلبي والي بهمني اني ارضيك وبس...😳";
}
else if (step == 4) {
document.getElementById("text").innerText = "!يا ساره يا عيوني انتي لو زعلتك بنهار صدقيني انا مابحب ازعلك انتي كتير مهمه بلنسبه الي زي اخت كبيره يهني رضاك يهمني زعلك لو زعلتي انا ما بيكمل يومي بزعل عل زعلك💖";
}
else if (step == 5) {
document.getElementById("text").innerText = "كمان بفرح برضاك انتي انسانه قيمه بحياتي كتير غاليتي و اختي وحياتي لاتزعلي مني بيوم مابتحمل صدقيني بحس حالي مختنق لما ما احكيك بيوم💖";
}
else if (step == 6) {
document.getElementById("text").innerText = "لو قريتي صار فيك تضغطي عزر المفاجا🥺";
}
};

document.getElementById("btnLove").onclick = function () {
document.getElementById("text").innerText =
"لو كبستي هلزر رح اعرف اني مو مهم او مرغوب بلنسبه الك ولو كبستيه من باب لفضول خبريني 💕";
};

document.getElementById("btnFun").onclick = function () {
document.getElementById("text").innerText =
`يا ساره يا نغمةٍ تعزفها أيّامي
يا فرحةٍ تسكن بين أحلامي

يا ضحكةٍ تسبق الحرف والكلام
وتزرع بقلبي ألف معنى ووئام

معك تمرّ اللحظات خفيفة مثل النسيم
ويصير الحزن بعيد… كأنه حلم قديم

يا ساره يا وجهٍ يشبه ضوء القمر
إذا غبتِ لحظة، يضيع في عيني السهر

صداقتنا قصة ما تشبه أي حكاية
مليانة حب وصدق وأجمل بداية

نمشي سوا مهما تغيّر فينا الزمن
وتبقى قلوبنا على نفس الوطن

يا ساره يا سرّ الفرح في عيوني
يا أغلى صديقة وأقرب من تكوني

لو أكتب الشعر ما يوفي المعاني
ولا يوصف غلاك ولا طيبك في كياني

تبقين دايم نور عمري وأمانه
وأجمل هدية من الزمن… يا ساره ❤️`;
};
</script>

</body>
</html>
